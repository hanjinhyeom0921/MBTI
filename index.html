<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 프리미엄 성격 유형 검사 PRO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <!-- 시작 화면 -->
    <div id="start-screen" class="screen active">
      <div class="main-glow"></div>
      <!-- 대문 비주얼 이미지 -->
      <div class="screen-img-wrap">
        <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600&auto=format&fit=crop" alt="Main Visual" class="screen-img">
      </div>
      <h1>AI 심층 성격 유형 검사 PRO</h1>
      <p>정교해진 20개의 핵심 문항을 통해 당신의 잠재적 인지 기능과 행동 매트릭스를 정밀 분석합니다.</p>
      <button type="button" class="primary-btn" onclick="startQuiz()">
        테스트 시작하기 →
      </button>
    </div>

    <!-- 질문 화면 -->
    <div id="quiz-screen" class="screen">
      <div class="progress-container">
        <span id="progress-text">01 / 20</span>
        <div class="progress-bar">
          <i id="progress-line"></i>
        </div>
      </div>
      
      <!-- 질문별 유동 이미지 영역 -->
      <div class="screen-img-wrap">
        <img id="question-img" src="" alt="Question Visual" class="screen-img">
      </div>

      <h2 id="question-text">질문 내용이 여기에 표시됩니다.</h2>
      <div class="answers">
        <button type="button" class="answer-btn" id="ans-a" onclick="selectAnswer('A')">선택지 A</button>
        <button type="button" class="answer-btn" id="ans-b" onclick="selectAnswer('B')">선택지 B</button>
      </div>
    </div>

    <!-- 로딩 화면 -->
    <div id="loading-screen" class="screen">
      <div class="loader-wrap">
        <div class="spinner"></div>
        <div class="spinner-inner"></div>
      </div>
      <p id="loading-text">답변 기반 성향 매트릭스 동기화 중...</p>
    </div>

    <!-- 결과 화면 -->
    <div id="result-screen" class="screen">
      <div class="badge">ANALYSIS RESULT</div>
      
      <!-- 결과별 유형 이미지 영역 -->
      <div class="screen-img-wrap result-img-wrap">
        <img id="result-img" src="" alt="Result Visual" class="screen-img">
      </div>

      <h1 id="result-type">INFJ</h1>
      <h3 id="result-title">선의의 옹호자</h3>
      <div class="desc-card">
        <p id="result-desc">결과에 대한 상세 설명이 여기에 들어갑니다.</p>
      </div>
      <button type="button" class="ghost-btn" onclick="restartQuiz()">
        다시 테스트하기
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
